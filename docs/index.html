<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PageReset</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f2f2f7;
      --fg: #1c1c1e;
      --muted: #6c6c70;
      --accent: #007aff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --fg: #f5f5f7;
        --muted: #98989d;
        --accent: #0a84ff;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--fg);
      text-align: center;
      padding: 24px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    p { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div>
    <h1>PageReset</h1>
    <p>Make any webpage usable again.</p>
    <p>
      <a href="support.html">Support</a>
      ·
      <a href="privacy.html">Privacy Policy</a>
    </p>
  </div>
</body>
</html>
